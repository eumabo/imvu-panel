<!doctype html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="./assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shop Yeex</title>  
  <style>
    :root{
      --bg:#0b0b10;
      --panel: rgba(0,0,0,.45);
      --panel2: rgba(0,0,0,.35);
      --border: rgba(255,255,255,.12);
      --border2: rgba(255,255,255,.08);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --muted2: rgba(255,255,255,.45);
      --shadow: 0 14px 50px rgba(0,0,0,.65);
      --glow: 0 0 0 1px rgba(255,255,255,.06), 0 0 28px rgba(255,255,255,.08);
      --accent: linear-gradient(90deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
      --btn: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      --btnHover: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06));
      --danger: linear-gradient(180deg, rgba(180,40,40,.55), rgba(120,20,20,.55));
      --dangerHover: linear-gradient(180deg, rgba(210,60,60,.60), rgba(140,30,30,.60));
      --radius: 10px;
      --radius2: 14px;
    }

    *{ box-sizing:border-box; }
    html, body { height:100%; }
    body {
  margin: 0;
  font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color: rgba(255,255,255,.92);
  background: url("./assets/yeex-background-4k.png") no-repeat center center fixed;
  background-size: cover;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(900px 600px at 50% 20%, rgba(0,0,0,.35), rgba(0,0,0,.85)),
    linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.90));
  pointer-events:none;
  z-index:0;
}
.wrap{
  position:relative;
  z-index:1;
  max-width: 1520px;
  margin: 0 auto;
  padding: 18px 22px 40px;

  /* big glass container (pro look) */
  background: rgba(0,0,0,.18);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 18px;
  backdrop-filter: blur(10px);
}

    /* Top header (logo + nav) */
    .top{
      position:relative;
      border:1px solid var(--border2);
      background: rgba(0,0,0,.35);
      box-shadow: var(--shadow);
      border-radius: var(--radius2);
      overflow:hidden;
    }
    .top:before{
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(180deg, rgba(255,255,255,.06), transparent 45%);
      pointer-events:none;
    }

.logo {
  display: flex;
  justify-content: center;   /* centraliza horizontal */
  align-items: center;       /* centraliza vertical (se precisar) */
}

.logo img {
  height: 50px; 
}
    
    .nav{
      display:flex;
      justify-content:center;
      gap: 44px;
      padding: 10px 16px 14px;
      border-top:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      backdrop-filter: blur(8px);
      font-size: 14px;
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    .nav a{
      color: rgba(255, 255, 255, 0.78);
      text-decoration:none;
      padding: 6px 10px;
      border-radius: 999px;
      transition:.2s ease;
    }
    .nav a:hover{ background: rgba(255,255,255,.06); color:#fff; }

    /* Controls row */
    .controls{
  margin-top: 14px;
  display:block; /* sidebar removed */
}

    /* Left main content */
    .main{
      min-width: 0;
      width: 100%;
    }

    .bar{
      display:flex;
      gap: 12px;
      align-items:center;
      border:1px solid var(--border2);
      background: rgba(0,0,0,.30);
      border-radius: var(--radius2);
      padding: 12px 12px;
      box-shadow: var(--glow);
    }

    .search{
      flex: 1;
      display:flex;
      gap: 10px;
      align-items:center;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.25);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .search svg{ opacity:.7; }
    .search input{
      width:100%;
      border:0;
      outline:0;
      background:transparent;
      color: rgba(255,255,255,.90);
      font-size: 14px;
    }
    .search input::placeholder{ color: rgba(255,255,255,.45); }

    .tabs{
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .tab{
      cursor:pointer;
      user-select:none;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.25);
      color: rgba(255,255,255,.78);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      text-transform: uppercase;
      transition:.15s ease;
    }
    .tab:hover{ background: rgba(255,255,255,.06); color:#fff; }
    .tab.active{
      background: rgba(255,255,255,.08);
      color:#fff;
      box-shadow: 0 0 0 1px rgba(255,255,255,.06), 0 0 18px rgba(255,255,255,.08);
    }

    /* Right sidebar panels */
    .side{
      display:flex;
      flex-direction:column;
      gap: 18px;
    }

    .panel, .section, .top{
  background: rgba(0,0,0,.42);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.10);
}

    .panel h3{
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 800;
      color: rgba(255,255,255,.90);
    }

    .field{
      width:100%;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.22);
      color: rgba(255,255,255,.90);
      border-radius: 10px;
      padding: 12px 12px;
      outline:none;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .field::placeholder{ color: rgba(255,255,255,.45); }

    .btn{
      width:100%;
      border:1px solid rgba(255,255,255,.14);
      background: var(--btn);
      color: rgba(255,255,255,.90);
      border-radius: 10px;
      padding: 12px 12px;
      font-weight: 800;
      cursor:pointer;
      text-transform: uppercase;
      letter-spacing: .5px;
      transition:.15s ease;
    }
    .btn:hover{ background: var(--btnHover); }
    .btn.danger{ background: var(--danger); border-color: rgba(255,120,120,.25); }
    .btn.danger:hover{ background: var(--dangerHover); }

    /* Sections */
    .section{
      margin-top: 18px;
      border:1px solid var(--border2);
      background: rgba(0,0,0,.26);
      border-radius: var(--radius2);
      padding: 16px;
      box-shadow: var(--glow);
    }
    .sectionHead{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
      margin-bottom: 12px;
    }
    .sectionHead h2{
      margin:0;
      font-size: 30px;
      font-weight: 900;
      letter-spacing:-.4px;
      color: rgba(255,255,255,.88);
    }
    .sectionHead a{
      color: rgba(255,255,255,.72);
      text-decoration:none;
      font-size: 14px;
    }
    .sectionHead a:hover{ color:#fff; }

    .grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    @media (max-width: 1160px){
      .controls{ grid-template-columns: 1fr; }
      .grid{ grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 720px){
      .grid{ grid-template-columns: 1fr; }
      .nav{ gap: 14px; flex-wrap:wrap; }
      .logo{ font-size: 42px; }
    }

    .card{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.32);
      border-radius: var(--radius);
      overflow:hidden;
      box-shadow: 0 10px 28px rgba(0,0,0,.55);
      transition:.18s ease;
      position:relative;
    }
    .card:hover{
      transform: translateY(-2px);
      box-shadow: 0 14px 36px rgba(0,0,0,.65), 0 0 18px rgba(255,255,255,.10);
    }
    .cardTop{
      height: 150px;
      background: rgba(255, 255, 255, 0.25);
      border-bottom: 1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .cardTop img{
      width:100%;
      height:100%;
      object-fit:cover;
      filter: contrast(1.05) brightness(.95);
      transform: scale(1.03);
      transition: .25s ease;
    }
    .card:hover .cardTop img{ transform: scale(1.08); }

    .cardBody{
      padding: 12px 12px 14px;
    }
    
    .title{
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 1.5px;
  margin: 0 0 6px;

  color: #ffffff;
  -webkit-text-stroke: 1px #000;

  text-shadow:
    0 0 6px rgba(255, 255, 255, 0.55),
    0 0 18px rgba(134, 134, 134, 0.35),
    -1px -1px 0 #000,
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000;

  animation: yeexNeon 1.6s ease-in-out infinite;
}

@keyframes yeexNeon{
  0%, 100%{
    text-shadow:
      0 0 5px rgba(255, 255, 255, 0.45),
      0 0 14px rgba(119, 119, 119, 0.28),
      -1px -1px 0 #000,
       1px -1px 0 #000,
      -1px  1px 0 #000,
       1px  1px 0 #000;
    transform: translateY(0);
  }
  50%{
    text-shadow:
      0 0 8px rgba(255, 255, 255, 0.75),
      0 0 24px rgba(141, 141, 141, 0.5),
      -1px -1px 0 #000,
       1px -1px 0 #000,
      -1px  1px 0 #000,
       1px  1px 0 #000;
    transform: translateY(-1px);
  }
}

    .sub{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
      color: rgba(255,255,255,.78);
      font-size: 13px;
      margin-bottom: 10px;
    }
    .price{
      font-weight: 900;
      letter-spacing: .2px;
      white-space:nowrap;
    }
    .tags{
      color: rgba(255,255,255,.50);
      font-size: 12px;
      margin-bottom: 10px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .cardBtn{
      width: 140px;
      border:1px solid rgba(255,255,255,.14);
      background: var(--btn);
      color: rgba(255,255,255,.90);
      border-radius: 6px;
      padding: 9px 10px;
      font-weight: 900;
      cursor:pointer;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: .5px;
      transition:.15s ease;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
    }
    .cardBtn:hover{ background: var(--btnHover); }
    .cardBtn.red{ background: var(--danger); border-color: rgba(255,120,120,.25); }
    .cardBtn.red:hover{ background: var(--dangerHover); }

    /* Catalog filters row */
    .catFilters{
      margin-top: 10px;
      display:grid;
      grid-template-columns: 1.2fr repeat(5, 1fr);
      gap: 10px;
    }
    @media (max-width: 1160px){
      .catFilters{ grid-template-columns: 1fr 1fr; }
      .catFilters .span2{ grid-column: span 2; }
    }

    .mini{
      height: 42px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin:0;
    }

    select.field{ appearance:none; }

    .count{
      margin-top: 10px;
      color: rgba(255,255,255,.55);
      font-size: 13px;
    }

    .toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.70);
      border:1px solid rgba(255,255,255,.12);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      color: rgba(255,255,255,.90);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events:none;
      transition: .22s ease;
      z-index: 9;
      max-width: calc(100% - 24px);
    }
    .toast.show{ opacity: 1; }
  

/* ===== YEEX polish pack (full width) ===== */
:root{
  --glassA: rgba(18,18,24,.58);
  --glassB: rgba(12,12,16,.46);
  --lineA: rgba(255,255,255,.10);
  --lineB: rgba(255,255,255,.06);
  --shadowA: 0 18px 60px rgba(0,0,0,.60);
  --shadowB: 0 10px 28px rgba(0,0,0,.45);
}

.wrap{
  max-width: 1520px;
  padding: 28px 24px 60px;
}

/* tighten top header and add subtle highlight */
.top{
  background:
    radial-gradient(900px 260px at 50% 0%, rgba(255,255,255,.08), transparent 70%),
    linear-gradient(180deg, rgba(255,255,255,.05), transparent 55%),
    rgba(12,12,16,.60);
  box-shadow: var(--shadowA);
}

.logo img{
  height: 56px;
  filter: drop-shadow(0 12px 24px rgba(0,0,0,.55));
}

.nav{
  gap: 36px;
  padding: 12px 16px 16px;
  border-top: 1px solid rgba(255,255,255,.08);
}

/* Search bar + tabs align & breathing */
.bar{
  padding: 14px 14px;
  gap: 14px;
  background: rgba(14,14,18,.58);
  box-shadow: var(--shadowB);
}

.search{
  border-radius: 14px;
  padding: 12px 14px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.10);
}

.tabs{
  gap: 8px;
}

.tab{
  padding: 10px 14px;
  border-radius: 12px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.10);
}
.tab.active{
  background: rgba(255,255,255,.09);
  border-color: rgba(255,255,255,.16);
  box-shadow: 0 0 0 1px rgba(255,255,255,.06), 0 0 18px rgba(255,255,255,.08);
}

/* Sections */
.section{
  padding: 18px;
  background: rgba(18,18,24,.58);
  border: 1px solid rgba(255,255,255,.10);
  box-shadow: var(--shadowB);
}

.sectionHead{
  margin-bottom: 14px;
  align-items:center;
}
.sectionHead h2{
  font-size: 34px;
  letter-spacing: -.4px;
  text-shadow: 0 14px 40px rgba(0,0,0,.55);
}

/* Make filters row wrap nicer on wide screens */
.catFilters{
  grid-template-columns: 1.3fr repeat(6, 1fr);
  gap: 12px;
}
@media (max-width: 1300px){
  .catFilters{ grid-template-columns: 1fr 1fr 1fr 1fr; }
  .catFilters .span2{ grid-column: span 2; }
}
@media (max-width: 900px){
  .catFilters{ grid-template-columns: 1fr 1fr; }
  .catFilters .span2{ grid-column: span 2; }
}

/* Grid: fill screen better */
.grid{
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}
@media (max-width: 1260px){
  .grid{ grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 920px){
  .grid{ grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px){
  .grid{ grid-template-columns: 1fr; }
}

/* Cards: more premium */
.card{
  border-radius: 14px;
  background: rgba(12,12,16,.62);
  border: 1px solid rgba(255,255,255,.10);
  box-shadow: 0 16px 44px rgba(0,0,0,.55);
}
.card:hover{
  transform: translateY(-3px);
  box-shadow: 0 22px 60px rgba(0,0,0,.62), 0 0 18px rgba(255,255,255,.10);
}

.cardTop{
  height: 170px;
  background: rgba(0,0,0,.28);
}

.cardTop img{
  filter: contrast(1.10) brightness(.95);
  transform: scale(1.03);
}
.card:hover .cardTop img{ transform: scale(1.09); }

.cardBody{ padding: 14px 14px 16px; }

.sub{
  margin-bottom: 12px;
  color: rgba(255,255,255,.80);
}

.tags{
  margin-bottom: 12px;
  color: rgba(255,255,255,.52);
}

.cardBtn{
  width: 160px;
  border-radius: 8px;
  padding: 10px 12px;
}

/* Tiny separator line inside sections (like the reference) */
.sectionHead:after{
  content:"";
  display:block;
  height:1px;
  width:100%;
  margin-top: 10px;
  background: linear-gradient(90deg, rgba(255,255,255,.10), rgba(255,255,255,.02));
}

/* ===== HERO BEST SELLER ===== */

.hero{
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.10);
  box-shadow: 0 25px 70px rgba(0,0,0,.65);
  background: rgba(0,0,0,.35);
}

.hero img{
  width: 100%;
  height: 420px;
  object-fit: cover;
  display: block;
  transition: transform .4s ease;
}

.hero:hover img{
  transform: scale(1.02);
}

/* responsivo */
@media (max-width: 900px){
  .hero img{ height: 320px; }
}

@media (max-width: 600px){
  .hero img{ height: 240px; }
}
  </style>
</head>

    // =========================
    // TRACKING LOCAL (cliques)
    // =========================
    const CLICK_KEY = "yeex_clicks_v1";

    function loadClicks(){
      try { return JSON.parse(localStorage.getItem(CLICK_KEY) || "[]"); }
      catch { return []; }
    }
    function saveClicks(v){ localStorage.setItem(CLICK_KEY, JSON.stringify(v)); }

    function trackClick(productId){
      const arr = loadClicks();
      arr.push({ id: productId, ts: Date.now() });
      saveClicks(arr);
    }

    // =========================
    // UI helpers
    // =========================
    const $ = (id)=>document.getElementById(id);

    function toast(msg){
      const t = $("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(window.__toastT);
      window.__toastT = setTimeout(()=>t.classList.remove("show"), 1400);
    }

    function norm(s){ return String(s||"").toLowerCase().trim(); }

    // current filters
    const state = {
      tab: "all",
      q: "",
      type: "",
      gender: "",
      category: "",
      tag: "",
      min: "",
      max: ""
    };

    function cardHTML(p, red=false){
      const tags = (p.tags || []).slice(0,3).join(" • ");
      const btnClass = red ? "cardBtn red" : "cardBtn";
      const safeLink = p.link && p.link !== "#" ? p.link : "javascript:void(0)";
      const btnLabel = "VER NO IMVU";

      return `
        <article class="card">
          <div class="cardTop">
            <img src="${p.img}" alt="${p.name}">
          </div>
          <div class="cardBody">
            <div class="title">${p.name}</div>
            <div class="sub">
              <div class="price">${p.price} CRÉDITOS</div>
              <div style="color:rgba(255,255,255,.55);text-transform:uppercase;font-size:12px">${p.type}</div>
            </div>
            <div class="tags">${tags || "&nbsp;"}</div>
            <a class="${btnClass}" href="${safeLink}" target="_blank" rel="noopener" data-click="1" data-id="${p.id}">
              ${btnLabel}
            </a>
          </div>
        </article>
      `;
    }

    function applyFilters(list){
      const q = norm(state.q);
      const type = state.type;
      const gender = state.gender;
      const category = norm(state.category);
      const tag = norm(state.tag);
      const min = Number(state.min || NaN);
      const max = Number(state.max || NaN);

      return list.filter(p=>{
        // tabs
        if (state.tab === "shoe" && p.type !== "shoe") return false;
        if (state.tab === "clothing" && p.type !== "clothing") return false;
        if (state.tab === "unisex" && p.gender !== "unisex") return false;
        if (state.tab === "offers" && !p.offer) return false;
        if (state.tab === "fav" && !p.fav) return false;

        // filters
        if (q && !norm(p.name).includes(q)) return false;
        if (type && p.type !== type) return false;
        if (gender && p.gender !== gender) return false;
        if (category && !norm(p.category).includes(category)) return false;

        if (tag){
          const ok = (p.tags || []).some(t => norm(t).includes(tag));
          if (!ok) return false;
        }

        if (!Number.isNaN(min) && Number(p.price||0) < min) return false;
        if (!Number.isNaN(max) && Number(p.price||0) > max) return false;

        return true;
      });
    }

    function renderCatalog(){
      const filtered = applyFilters(PRODUCTS);
      $("grid").innerHTML = filtered.map(p => cardHTML(p, p.offer)).join("");
      $("resultCount").textContent = `${filtered.length} item(ns)`;
      bindClicks();
    }

    function renderTopWeek(){
      const now = Date.now();
      const weekAgo = now - (7*24*60*60*1000);
      const clicks = loadClicks().filter(c => c.ts >= weekAgo);

      const counts = new Map();
      for (const c of clicks) counts.set(c.id, (counts.get(c.id)||0) + 1);

      const ranked = [...counts.entries()]
        .sort((a,b)=>b[1]-a[1])
        .slice(0,3)
        .map(([id,n])=>{
          const p = PRODUCTS.find(x=>x.id===id);
          return p ? {p,n} : null;
        })
        .filter(Boolean);

      if (!ranked.length){
        // fallback = first 3 items
        const fallback = PRODUCTS.slice(0,3).map(p=>({p,n:0}));
        $("topGrid").innerHTML = fallback.map(({p})=>cardHTML(p, p.offer)).join("");
        $("topCount").textContent = `0 cliques (últimos 7 dias)`;
      } else {
        $("topGrid").innerHTML = ranked.map(({p})=>cardHTML(p, p.offer)).join("");
        const total = [...counts.values()].reduce((a,b)=>a+b,0);
        $("topCount").textContent = `${total} cliques (últimos 7 dias)`;
      }
      bindClicks();
    }

    function bindClicks(){
      document.querySelectorAll("[data-click='1']").forEach(a=>{
        a.addEventListener("click", ()=>{
          const id = a.getAttribute("data-id");
          if (!id) return;
          trackClick(id);
          renderTopWeek();
        }, { once: true });
      });
    }

    function syncFromInputs(){
      state.q = $("q").value;
      state.type = $("type").value;
      state.gender = $("gender").value;
      state.category = $("category").value;
      state.tag = $("tag").value;
      state.min = $("min").value;
      state.max = $("max").value;
    }

    // Tabs
    document.querySelectorAll(".tab").forEach(t=>{
      t.addEventListener("click", ()=>{
        document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
        t.classList.add("active");
        state.tab = t.getAttribute("data-tab") || "all";
       // renderTopWeek(); // removido
renderCatalog();
      });
    });

    // Top search mirrors catalog search
    $("qTop").addEventListener("input", (e)=>{
      const v = e.target.value;
      $("q").value = v;
      state.q = v;
      renderCatalog();
    });

    
    // Clear filters
    $("clearFilters").addEventListener("click", (e)=>{
      e.preventDefault();
      state.q = state.type = state.gender = state.category = state.tag = state.min = state.max = "";
      $("q").value = $("type").value = $("gender").value = $("category").value = $("tag").value = $("min").value = $("max").value = "";
      renderCatalog();
      toast("Filtros limpos");
    });

    
    // nav gender shortcuts
    document.querySelectorAll("[data-nav]").forEach(a=>{
      a.addEventListener("click", ()=>{
        const g = a.getAttribute("data-nav");
        if (g === "female" || g === "male"){
          $("gender").value = g;
          state.gender = g;
          renderCatalog();
        }
      });
    });

    // Catalog inputs live
    ["q","type","gender","category","tag","min","max"].forEach(id=>{
      $(id).addEventListener("input", ()=>{
        syncFromInputs();
        renderCatalog();
      });
      $(id).addEventListener("change", ()=>{
        syncFromInputs();
        renderCatalog();
      });
    });

    // Quick buttons
    $("seeAll").addEventListener("click", ()=>{
      document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      document.querySelector(".tab[data-tab='all']").classList.add("active");
      state.tab = "all";
      renderCatalog();
    });

    // Init
    syncFromInputs();
    // renderTopWeek(); // removido
renderCatalog();
  </script>
