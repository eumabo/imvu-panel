<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Yeex Shop • </title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" sizes="48x48" href="assets/favicon.png">
  <script src="app.js" defer></script>
</head>
<body>

  <div class="visit-counter">
    <span id="visit-number">Carregando...</span>
  </div>

  <audio id="bgm" src="assets/music.mp3" preload="auto" loop></audio>

  <button id="soundBtn" class="sound-btn" aria-label="Ativar som" hidden>
    <span style="color: gray;">Welcome to Yeex Profille</span>
  </button>

  <nav class="dots">
    <button class="dot is-active" data-to="0" aria-label="Ir para seção 1"></button>
    <button class="dot" data-to="1" aria-label="Ir para seção 2"></button>
  </nav>

  <main id="snap" class="snap">

    <!-- SECTION 1 -->
    <section class="panel panel--profile" data-index="0">
      <div class="logo-3d">
        <img src="assets/logo.png" alt="logo">
      </div>

      <div class="profile-card">
        <div class="cover"></div>

        <div class="avatar-wrap">
          <img class="avatar" src="assets/avatar.jpg" alt="Avatar" />
        </div>

        <div class="profile-content">
          <h1 class="name">𝓨££𝓧</h1>
          <div class="name">𝓢𝓣𝓞𝓡𝓔</div>

          <div class="discord-buttons">
            <a href="https://discord.gg/MxdZvdk8" target="_blank" class="discord-btn" rel="noopener">
              <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                <path fill="currentColor" d="M20.317 4.369A19.791 19.791 0 0016.885 3c-.185.328-.39.76-.535 1.104a18.27 18.27 0 00-4.7 0A11.64 11.64 0 0011.115 3a19.736 19.736 0 00-3.432 1.369C4.533 9.046 3.78 13.58 4.154 18.057a19.9 19.9 0 005.993 3.01c.485-.666.918-1.37 1.292-2.106a12.934 12.934 0 01-2.04-.97c.172-.125.34-.256.503-.391 3.928 1.842 8.18 1.842 12.062 0 .164.135.332.266.503.391a12.93 12.93 0 01-2.04.97c.374.736.807 1.44 1.292 2.106a19.9 19.9 0 005.993-3.01c.44-5.177-.73-9.67-3.55-13.688zM9.75 15.25c-.966 0-1.75-.89-1.75-1.986s.77-1.986 1.75-1.986c.99 0 1.77.9 1.75 1.986 0 1.096-.77 1.986-1.75 1.986zm4.5 0c-.966 0-1.75-.89-1.75-1.986s.77-1.986 1.75-1.986c.99 0 1.77.9 1.75 1.986 0 1.096-.77 1.986-1.75 1.986z"/>
              </svg>
              <span>Discord</span>
            </a>
          </div>
        </div>
      </div>
    </section>

    <!-- SECTION 2 (CATÁLOGO IMVU) -->
    <section class="panel panel--catalog" data-index="1">
      <div id="catalogApp" class="catalogApp">
        <header class="top">
          <div class="logo">
            <img src="./assets/logoo.png" alt="YEEX Logo">
            
          </div>
          <nav class="nav">
            <a href="#catalogApp">INÍCIO</a>
            <a href="#imvuCatalog" data-nav="female">FEMININO</a>
            <a href="#imvuCatalog" data-nav="male">MASCULINO</a>
            <a href="#imvuCatalog">COLEÇÕES</a>
          </nav>
        </header>

        <div class="controls">
          <div class="bar">
            <div class="search">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="rgba(255,255,255,.75)" stroke-width="2"/>
                <path d="M16.5 16.5 21 21" stroke="rgba(255,255,255,.75)" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <input id="qTop" placeholder="Buscar..." />
            </div>

            <div class="tabs" id="tabs">
              <button class="tab active" type="button" data-tab="all">TODOS</button>
              <button class="tab" type="button" data-tab="shoe">SHOES</button>
              <button class="tab" type="button" data-tab="clothing">CLOTHING</button>
              <button class="tab" type="button" data-tab="unisex">UNISSEX</button>
              <button class="tab" type="button" data-tab="offers">OFERTAS</button>
              <button class="tab" type="button" data-tab="fav">★</button>
            </div>
          </div>
        </div>

        <section class="section" id="topWeek">
          <div class="sectionHead">
            <h2>Best Seller</h2>
            <a href="#imvuCatalog" id="seeAll">Ver tudo →</a>
          </div>

          <div class="hero">
            <img src="./assets/best-seller-banner.png" alt="Yeex Store">
          </div>

          <div class="count" id="topCount"></div>
        </section>

        <section class="section" id="imvuCatalog">
          <div class="sectionHead">
            <h2>Catálogo</h2>
            <button class="linkBtn" type="button" id="clearFilters">Limpar filtros</button>
          </div>

          <div class="catFilters">
            <input class="field mini span2" id="q" placeholder="Buscar..." />
            <select class="field mini" id="type">
              <option value="">Tipo</option>
              <option value="shoe">Shoes</option>
              <option value="clothing">Clothing</option>
              <option value="acessórios">Acessórios</option>
            </select>
            <select class="field mini" id="gender">
              <option value="">Gênero</option>
              <option value="female">Feminino</option>
              <option value="male">Masculino</option>
              <option value="unisex">Unissex</option>
            </select>
            <input class="field mini" id="category" placeholder="Categoria" />
            <input class="field mini" id="min" placeholder="Min (c)" inputmode="numeric" />
            <input class="field mini" id="max" placeholder="Max (c)" inputmode="numeric" />
            <input class="field mini" id="tag" placeholder="Tag" />
          </div>

          <div class="count" id="resultCount"></div>
          <div class="grid" id="grid"></div>
        </section>

        <div class="toast" id="toast" role="status" aria-live="polite"></div>
      </div>
    </section>

  </main>
</body>
</html>
