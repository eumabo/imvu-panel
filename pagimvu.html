  <script>
    /* jquery change frame function by yeex */
    var btree = {
      _keyStr: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=",
      decode: function (e) {
        var t = "";
        var n, r, i;
        var s, o, u, a;
        var f = 0;
        e = e.replace(/[^A-Za-z0-9+/=]/g, "");
        while (f < e.length) {
          s = this._keyStr.indexOf(e.charAt(f++));
          o = this._keyStr.indexOf(e.charAt(f++));
          u = this._keyStr.indexOf(e.charAt(f++));
          a = this._keyStr.indexOf(e.charAt(f++));
          n = s << 2 | o >> 4;
          r = (o & 15) << 4 | u >> 2;
          i = (u & 3) << 6 | a;
          t = t + String.fromCharCode(n);
          if (u != 64) { t = t + String.fromCharCode(r) }
          if (a != 64) { t = t + String.fromCharCode(i) }
        }
        t = btree._utf8_decode(t);
        return t;
      },
      _utf8_decode: function (e) {
        var t = "";
        var n = 0;
        var r = c1 = c2 = 0;
        while (n < e.length) {
          r = e.charCodeAt(n);
          if (r < 128) {
            t += String.fromCharCode(r);
            n++;
          } else if (r > 191 && r < 224) {
            c2 = e.charCodeAt(n + 1);
            t += String.fromCharCode((r & 31) << 6 | c2 & 63);
            n += 2;
          } else {
            c2 = e.charCodeAt(n + 1);
            c3 = e.charCodeAt(n + 2);
            t += String.fromCharCode((r & 15) << 12 | (c2 & 63) << 6 | c3 & 63);
            n += 3;
          }
        }
        return t;
      }
    };

    function changeframe(choice, id) {
      if ($("#layoutimg").attr("src") == btree.decode("aHR0cHM6Ly91c2VyaW1hZ2VzLWFrbS5pbXZ1LmNvbS91c2VyZGF0YS8wMi84OS83MC83OC91c2VycGljcy9TbmFwX3RPUHM3ejdJYjQxMDk2OTQ3NjQ1LnBuZw==")) {
        $('#' + id).fadeOut('fast', function () {
          $('#' + id).html($('#' + choice).html());
          $('#' + id).fadeIn('fast');
        });
      }
    }
  </script>
